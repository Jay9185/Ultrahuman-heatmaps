<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Plotly Chart</title>
    
    <!-- 1. Load Plotly.js from a CDN instead of hardcoding it -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    
    <!-- Optional: Configure MathJax if your chart uses complex math formulas -->
    <script type="text/javascript">
        window.PlotlyConfig = {MathJaxConfig: 'local'};
    </script>
</head>
<body>

    <!-- 2. This is the container where your chart will be drawn -->
    <div id="plotly-chart" style="width: 100%; height: 600px; max-width: 1000px; margin: 0 auto;"></div>

    <!-- 3. Your specific chart data goes here -->
    <script type="text/javascript">
        // Replace the sample data below with the actual 'data' and 'layout' arrays from your Python/R export
        
        var chartData = [
            {
                x: [1, 2, 3, 4, 5],
                y: [10, 15, 13, 17, 22],
                type: 'scatter',
                mode: 'lines+markers',
                marker: {color: 'blue'}
            }
        ];

        var chartLayout = {
            title: 'My Interactive Chart',
            xaxis: { title: 'X-Axis Label' },
            yaxis: { title: 'Y-Axis Label' }
        };

        var chartConfig = {
            responsive: true, // Ensures the chart resizes nicely on mobile devices
            displayModeBar: true
        };

        // Render the chart in the div
        Plotly.newPlot('plotly-chart', chartData, chartLayout, chartConfig);
    </script>

</body>
</html>
